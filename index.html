.spinner{width:16px;height:16px;border:2px solid #2a2416;border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

@keyframes slin{from{transform:translateX(10px);opacity:0}to{transform:translateX(0);opacity:1}}

    }
    prevHit[a.id]=hit;
  });

function showToast(icon,title,msg,bg,bd){
  const d=document.createElement("div");d.className="toast";
  d.style.cssText=`background:${bg};border:1px solid ${bd};`;
  d.innerHTML=`<span style="font-size:14px">${icon}</span><div style="flex:1"><div style="font-weight:700;font-size:10px;color:${bd.replace("55","")}">${title}</div><div style="color:#a09080;margin-top:2px">${msg}</div></div><button onclick="this.parentNode.remove()" style="background:none;border:none;color:var(--dim)">✕</button>`;
  document.getElementById("toasts").prepend(d);
  setTimeout(()=>d.remove(),8000);
}

// ══ AI CALL ══════════════════════════════════════════════════
async function callAI(key,prompt,targetId){
  const el=document.getElementById(targetId);if(!el)return;
  if(el.style.display!=="none"&&el.innerHTML!==""){el.style.display="none";return;}
  el.style.display="block";
  if(aiCache[key]){el.innerHTML=aiCache[key];return;}
  el.innerHTML=`<div style="display:flex;gap:8px;align-items:center;padding:8px 0"><div class="spinner"></div><span style="color:var(--dim);font-size:11px">Analizando...</span></div>`;
  try{
    const res=await fetch("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt})});
    const d=await res.json();
    const text=d.text||d.error||"Sin respuesta.";
    const html=text.split("\n").map(l=>{
      if(l.startsWith("## "))return`<h3>${l.slice(3)}</h3>`;
      const h=l.replace(/\*\*(.*?)\*\*/g,(_,m)=>`<strong style="color:#f0e6c8">${m}</strong>`);
      if(!l.trim())return"<br>";
      return`<p>${h}</p>`;
    }).join("");
    el.innerHTML=html;aiCache[key]=html;
  }catch(e){el.innerHTML=`<p style="color:var(--red)">Error: ${e.message}</p>`;}
}

// ══ SPARK ══════════════════════════════════════════════════
function spark(data,pos,w=70,h=22){
  if(!data||data.length<2)return"";
  const v=data.filter(Boolean);
  const min=Math.min(...v),max=Math.max(...v),range=max-min||1;
  const pts=v.map((x,i)=>`${(i/(v.length-1))*w},${h-((x-min)/range)*h}`).join(" ");
  const c=pos?"#4ade80":"#f87171";
  return`<svg width="${w}" height="${h}" style="display:block;flex-shrink:0"><polyline points="${pts}" fill="none" stroke="${c}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
}

// ══ SIG ══════════════════════════════════════════════════════
function computeSig(h,p){
  if(!h||h.length<5)return{s:"HOLD",st:0};
  const ma=h.slice(-8).reduce((a,b)=>a+b,0)/8;
  const peak=Math.max(...h);
  const drop=((peak-p)/peak*100),mom=((p-h[0])/h[0]*100);
  let s="HOLD",st=0;
  if(drop>8){s="BUY";st+=30;}if(p<ma*.97){s="BUY";st+=20;}
  if(mom>10){s="SELL";st=Math.max(st,28);}
  if(st<12)s="HOLD";
  return{s,st:Math.min(st,90)};
}
function sigBadge(s,st){
  if(s==="BUY")return`<span class="sig-buy">▲ COMPRAR${st>0?" "+st+"%":""}</span>`;
  if(s==="SELL")return`<span class="sig-sell">▼ VENDER${st>0?" "+st+"%":""}</span>`;
  return`<span class="sig-hold">◆ MANTENER</span>`;
}

function calcRelevance(title){
  const keywords=["oil","energy","fed","inflation","war","iran","defense","gold","nvidia","market","sp500"];
  const t=title.toLowerCase();
  return keywords.some(k=>t.includes(k))?"alta":"media";
}

// ══ ALERTAS ══════════════════════════════════════════════════
function renderAlertas(){
  return`
  <div class="card">
    <span class="lbl">PRECIOS EN TIEMPO REAL</span>
    <div style="display:flex;gap:7px;flex-wrap:wrap">
      ${watchlist.slice(0,8).map(t=>{
        const a=ASSETS[t],p=prices[t]||a?.price||0,h=histories[t]||[],isUp=p>=(h[0]||p);
        return`<div style="background:#141210;border:1px solid #1e1c14;border-radius:7px;padding:5px 9px;position:relative">
          <div style="color:#f0e6c8;font-size:11px;font-weight:700">${t}</div>
          <div style="color:${isUp?"var(--green)":"var(--red)"};font-size:11px">${a?.cur==="EUR"?"€":"$"}${p.toFixed(2)}</div>
          ${priceAlerts.some(al=>al.ticker===t&&al.on)?`<div style="position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:var(--yellow);animation:pulse 1.5s ease-in-out infinite"></div>`:""}
        </div>`;
      }).join("")}
    </div>
  </div>
  <div class="card" style="background:#0b0a07">
    <span class="lbl">+ CREAR ALERTA</span>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
      <div><div style="color:var(--dim);font-size:9px;margin-bottom:3px">ACTIVO</div><select id="al-t" style="width:120px">${watchlist.map(t=>`<option value="${t}">${t}</option>`).join("")}</select></div>
      <div><div style="color:var(--dim);font-size:9px;margin-bottom:3px">CONDICIÓN</div><select id="al-ty" style="width:120px"><option value="below">Baja de</option><option value="above">Sube de</option></select></div>
      <div><div style="color:var(--dim);font-size:9px;margin-bottom:3px">PRECIO</div><input type="number" step="0.01" id="al-lv" placeholder="0.00" style="width:90px"></div>
      <div style="flex:1;min-width:140px"><div style="color:var(--dim);font-size:9px;margin-bottom:3px">NOTA</div><input id="al-nt" placeholder="Ej: soporte clave..." style="width:100%"></div>
      <button class="btn" onclick="addAlert()">+ Añadir</button>
    </div>
  </div>
  ${priceAlerts.map((a,i)=>{
    const p=prices[a.ticker],asset=ASSETS[a.ticker];
    const dist=p?(a.type==="above"?((a.level-p)/p*100):((p-a.level)/p*100)):null;
    const close=dist!==null&&Math.abs(dist)<3,color=a.type==="above"?"var(--blue)":"var(--red)";
    return`<div style="background:var(--s1);border:1px solid ${close&&a.on?"#fbbf2444":"var(--bd)"};border-radius:9px;padding:10px 13px;opacity:${a.on?1:0.45};display:grid;grid-template-columns:auto 1fr auto auto;gap:9px;align-items:center;margin-bottom:6px">
      <div style="width:7px;height:7px;border-radius:50%;background:${a.on?(close?"var(--yellow)":color):"#3a3020"};${close&&a.on?"animation:pulse 1s ease-in-out infinite":""}"></div>
      <div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap">
          <span style="color:#f0e6c8;font-weight:700">${a.ticker}</span>
          <span style="background:${color}18;color:${color};font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px">${a.type==="above"?"SUBE DE":"BAJA DE"} ${asset?.cur==="EUR"?"€":"$"}${a.level}</span>
          ${close&&a.on?`<span style="color:var(--yellow);font-size:9px;font-weight:700;animation:blink 1s ease-in-out infinite">PROXIMO</span>`:""}
        </div>
        <div style="color:var(--dim);font-size:10px">Actual: ${p?`${asset?.cur==="EUR"?"€":"$"}${p.toFixed(2)}`:"--"} · Dist: ${dist!==null?Math.abs(dist).toFixed(1)+"%":"--"}${a.note?` · "${a.note}"`:""}
        </div>
      </div>
      <button class="btn-sm" onclick="toggleAlert(${i})" style="color:${a.on?"var(--green)":"var(--dim)"}">${a.on?"ON":"OFF"}</button>
      <button class="btn-sm" onclick="deleteAlert(${i})">X</button>
    </div>`;
  }).join("")}`;
}
function addAlert(){
  const t=document.getElementById("al-t")?.value,ty=document.getElementById("al-ty")?.value;
  const lv=parseFloat(document.getElementById("al-lv")?.value),nt=document.getElementById("al-nt")?.value||"";
  if(!t||!lv)return;
  priceAlerts.push({id:Date.now(),ticker:t,type:ty,level:lv,note:nt,on:true});
  renderTab();
}
function toggleAlert(i){priceAlerts[i].on=!priceAlerts[i].on;renderTab();}
function deleteAlert(i){priceAlerts.splice(i,1);renderTab();}

// ══ SIMULADOR ══════════════════════════════════════════════
function renderSim(){
  const sa=ASSETS[simTicker]||ASSETS["IBE.MC"];
  const sp=prices[simTicker]||sa.price;
  return`
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
  <div>
    <div class="card">
      <span class="lbl">TIPO</span>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
        <button id="btn-compra" onclick="simSetOp('compra')" style="background:#0a1f14;border:1px solid #4ade8055;color:var(--green);padding:9px;border-radius:7px;font-size:12px;font-weight:700">COMPRA</button>
        <button id="btn-venta" onclick="simSetOp('venta')" style="background:#0a0908;border:1px solid var(--bd);color:var(--dim);padding:9px;border-radius:7px;font-size:12px;font-weight:700">VENTA</button>
      </div>
    </div>
    <div class="card">
      <span class="lbl">ACTIVO</span>
      <select id="sim-t" style="width:100%;margin-bottom:7px" onchange="simTicker=this.value;renderTab()">
        ${Object.entries(ASSETS).map(([t,a])=>`<option value="${t}" ${t===simTicker?"selected":""}>${t} — ${a.name}</option>`).join("")}
      </select>
      <div style="background:#0a0908;border-radius:6px;padding:7px 9px;display:flex;justify-content:space-between;font-size:11px">
        <span style="color:var(--dim)">${sa.name} · ${sa.sector}</span>
        <span style="color:#f0e6c8;font-weight:600">${sa.cur==="EUR"?"€":"$"}${sp.toFixed(2)}</span>
      </div>
    </div>
    <div class="card">
      <span class="lbl">CONFIGURACIÓN</span>
      <div style="display:flex;flex-direction:column;gap:7px">
        <div><div style="color:var(--dim);font-size:9px;margin-bottom:3px">TÍTULOS</div><input type="number" min="1" id="sim-shares" value="100" style="width:100%" onchange="updateSimResult()"></div>
        <div><div style="color:var(--dim);font-size:9px;margin-bottom:3px">TIPO DE ORDEN</div>
          <select id="sim-order" style="width:100%" onchange="document.getElementById('sim-limit-row').style.display=this.value!=='market'?'block':'none';updateSimResult()">
            <option value="market">Mercado — ejecuta ahora</option>
            <option value="limit">Limitada — precio fijo</option>
            <option value="stop">Stop — al superar nivel</option>
          </select>
        </div>
        <div id="sim-limit-row" style="display:none"><div style="color:var(--dim);font-size:9px;margin-bottom:3px">PRECIO</div><input type="number" step="0.01" id="sim-limit" style="width:100%" placeholder="${sp.toFixed(2)}" onchange="updateSimResult()"></div>
        <div id="sim-coste-row" style="display:none"><div style="color:var(--dim);font-size:9px;margin-bottom:3px">PRECIO DE COSTE (IRPF)</div><input type="number" step="0.01" id="sim-coste" style="width:100%" placeholder="Precio al que compraste" onchange="updateSimResult()"></div>
      </div>
    </div>
  </div>
  <div>
    <div class="card" id="sim-result-card">
      <span class="lbl">RESUMEN — COMISIONES REALES SELFBANK</span>
      <div id="sim-result">Configura la operación...</div>
    </div>
    <button class="btn" style="width:100%;padding:11px;font-size:11px;margin-bottom:8px" onclick="callAI('sim-ai',buildSimPrompt(),'sim-ai-box')">✦ ANÁLISIS IA DE ESTA OPERACIÓN</button>
    <div id="sim-ai-box" class="ai-box" style="display:none"></div>
  </div>
  </div>`;
}
function simSetOp(op){
  simOp=op;
  const cb=document.getElementById("btn-compra"),vb=document.getElementById("btn-venta");
  const cr=document.getElementById("sim-coste-row");
  if(cb){cb.style.background=op==="compra"?"#0a1f14":"#0a0908";cb.style.borderColor=op==="compra"?"#4ade8055":"var(--bd)";cb.style.color=op==="compra"?"var(--green)":"var(--dim)";}
  if(vb){vb.style.background=op==="venta"?"#1f0a0a":"#0a0908";vb.style.borderColor=op==="venta"?"#f8717155":"var(--bd)";vb.style.color=op==="venta"?"var(--red)":"var(--dim)";}
  if(cr)cr.style.display=op==="venta"?"block":"none";
  updateSimResult();
}
function updateSimResult(){
  const t=document.getElementById("sim-t")?.value||simTicker;
  const sa=ASSETS[t]||ASSETS["IBE.MC"];
  const sp=prices[t]||sa.price;
  const shares=Math.max(1,parseInt(document.getElementById("sim-shares")?.value)||1);
  const orderType=document.getElementById("sim-order")?.value||"market";
  const limitVal=parseFloat(document.getElementById("sim-limit")?.value)||0;
  const ep=orderType!=="market"&&limitVal>0?limitVal:sp;
  const bruto=shares*ep,isEUR=sa.cur==="EUR";
  const comm=Math.max(bruto*(isEUR?0.0025:0.0015),isEUR?4:10);
  let canon=0;
  if(isEUR){if(bruto<=300)canon=0.09;else if(bruto<=3000)canon=0.09+(bruto-300)*0.0006;else if(bruto<=6000)canon=1.71+(bruto-3000)*0.0003;else canon=2.61+Math.min((bruto-6000)*0.0002,200);}
  const totComm=comm+canon,simTot=bruto+(simOp==="compra"?totComm:-totComm);
  const sCosteN=parseFloat(document.getElementById("sim-coste")?.value)||0;
  const plusv=simOp==="venta"&&sCosteN>0?(ep-sCosteN)*shares-totComm*2:null;
  let irpf=0;
  if(plusv>0){if(plusv<=6000)irpf=plusv*.19;else if(plusv<=50000)irpf=1140+(plusv-6000)*.21;else if(plusv<=200000)irpf=10380+(plusv-50000)*.23;else irpf=44880+(plusv-200000)*.27;}
  const escs=[-20,-10,-5,0,5,10,20,30].map(pct=>{const tp=ep*(1+pct/100);const vv=tp*shares;const co=Math.max(vv*(isEUR?0.0025:0.0015),isEUR?4:10);return{pct,g:vv-co-(bruto+totComm)};});
  const el=document.getElementById("sim-result");if(!el)return;
  el.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
      ${[["Valor bruto",`${isEUR?"€":"$"}${bruto.toFixed(2)}`,"#f0e6c8"],[`Comisión ${isEUR?"0.25%":"0.15%"}`,`€${comm.toFixed(2)}`,"#f0e6c8"],[isEUR?"Canon BME":"Cambio",isEUR?`€${canon.toFixed(2)}`:"1.085","#f0e6c8"],["TOTAL",`€${simTot.toFixed(2)}`,"var(--gold)"]]
        .map(([l,v,c],j)=>`<div style="background:${j===3?"#1a1610":"#0a0908"};border:1px solid ${j===3?"#a8945a33":"var(--bd)"};border-radius:6px;padding:6px 8px"><div style="color:#3a3020;font-size:8px;margin-bottom:1px">${l}</div><div style="color:${c};font-size:${j===3?"13":"11"}px;font-weight:${j===3?700:400}">${v}</div></div>`).join("")}
    </div>
    ${plusv!==null?`<div style="background:${plusv>=0?"#0a1408":"#140a0a"};border:1px solid ${plusv>=0?"#4ade8033":"#f8717133"};border-radius:7px;padding:8px 10px;margin-bottom:8px">
      <span class="lbl">FISCAL IRPF</span>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">
        ${[["Plusvalía",`€${plusv.toFixed(0)}`,plusv>=0?"var(--green)":"var(--red)"],["IRPF",`-€${irpf.toFixed(0)}`,"var(--red)"],["Neto",`€${(plusv-irpf).toFixed(0)}`,"var(--gold)"]]
          .map(([l,v,c])=>`<div style="text-align:center"><div style="color:#3a3020;font-size:8px;margin-bottom:2px">${l}</div><div style="color:${c};font-size:12px;font-weight:600">${v}</div></div>`).join("")}
      </div>
    </div>`:""}
    <span class="lbl">ESCENARIOS DE PRECIO</span>
    ${escs.map(e=>{const pos=e.g>=0,bw=Math.min(Math.abs(e.g)/(bruto*.4)*100,100);return`<div style="display:grid;grid-template-columns:38px 1fr 64px;gap:5px;align-items:center;padding:3px 4px;background:${e.pct===0?"#1a1610":"transparent"};border-radius:4px;margin-bottom:2px">
      <span style="color:${e.pct>0?"var(--green)":e.pct<0?"var(--red)":"var(--gold)"};font-size:10px;font-weight:600">${e.pct>0?"+":""}${e.pct}%</span>
      <div style="height:5px;background:#0a0908;border-radius:2px;overflow:hidden;position:relative"><div style="position:absolute;height:100%;width:${bw}%;left:${pos?"50%":50-bw+"%"};background:${pos?"#4ade8055":"#f8717155"};border-radius:2px"></div><div style="position:absolute;left:50%;top:0;height:100%;width:1px;background:#3a3020"></div></div>
      <span style="color:${pos?"var(--green)":"var(--red)"};font-size:10px;text-align:right">${pos?"+":""}€${e.g.toFixed(0)}</span>
    </div>`;}).join("")}`;
}
function buildSimPrompt(){
  const t=document.getElementById("sim-t")?.value||simTicker;
  const sa=ASSETS[t]||ASSETS["IBE.MC"];
  const sp=prices[t]||sa.price;
  const shares=parseInt(document.getElementById("sim-shares")?.value)||100;
  return`Analiza operación ${simOp.toUpperCase()} de ${t} (${sa.name}), ${shares} títulos a ${sa.cur==="EUR"?"€":"$"}${sp.toFixed(2)}. Contexto 15 mar 2026: Ormuz cerrado, Brent $100+. Perfil 70/30. Validación, orden recomendada (mercado o limitada), stop-loss orientativo, escenarios si Ormuz reabre o permanece cerrado.`;
}

// ══ HELPERS ══════════════════════════════════════════════════
function toggleSection(id){
  const el=document.getElementById(id);if(!el)return;
  const open=el.style.display==="none";el.style.display=open?"block":"none";
  const arr=document.getElementById("arr-"+id);if(arr)arr.textContent=open?"▲":"▼";
}

// ══ INIT ══════════════════════════════════════════════════════
renderTab();
updateStats();
